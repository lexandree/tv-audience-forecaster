name: Notify Portfolio

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'portfolio-export.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository dispatch to Portfolio
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_FOR_PORTFOLIO }}
          repository: lexandree/schaufenster
          event-type: portfolio-update
          client-payload: '{"project": "tv-audience-forecaster"}'
